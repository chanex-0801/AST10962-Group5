<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum of Urban Legends</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="UrbanLegend.png">
     <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    

  </style>
</head>
<body>
  <header>
    <fonts style="text-align:center">
    <h1>Hong Kong Urban Legends</h1>
    <p>Hong Kong Urban Legends Museum</p>
    </fonts>
    <!-- Ambient Background Glows -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <nav class="navbar glass-nav">
        <a href="index.html" class="nav-logo"></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="nt.html">New Territories</a>
            <a href="kl.html">Kowloon</a>
            <a href="hki.html">Hong Kong Iland</a>
            <a href="aboutus.html" class="active">Contect Us</a>
        </div>
    </nav>
 <main class="container">

  <section class="glass-card">
            <div class="card-header">
                <span class="tag">#Contect Us</span>
                <span class="tag">#UrbanLegend</span>
                <span class="tag">#HongKong</span>
            </div>

            <h1 class="gradient-text">Contect Us</h1>
            <h3></h3>
    
  </div>


        <form id="contactForm">
            <!-- Inquiry type -->
            <div class="form-group">
                <label for="inquiryType">Inquiry type <span class="required">*</span></label>
                <select id="inquiryType" name="inquiryType" required>
                    <option value="" disabled selected>Select</option>
                    <option value="general">General Inquiry</option>
                    <option value="feedback">Feedback</option>
                    <option value="support">Technical Support</option>
                </select>
            </div>

            <!-- Name -->
            <div class="form-group">
                <label for="name">Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="Please enter your name." required>
            </div>

            <!-- Contact -->
            <div class="form-group">
                <label for="contactInfo">Contact</label>
                <input type="text" id="contactInfo" name="contactInfo" placeholder="Please enter your contact information.">
            </div>

           <!-- Email -->
          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="Please enter your e-mail." required>
            <button type="button" class="verify-btn" id="verifyBtn">Send Verification Code</button>
          </div>

            <!-- OTP Section (Hidden by default) -->
            <div class="form-group" id="otpSection" style="display: none; background-color: #f9f9f9; padding: 15px; border-radius: 4px;">
              <label for="otpInput" style="color: #000;">Enter Verification Code</label>
              <input type="text" id="otpInput" placeholder="Enter 6-digit code" style="margin-bottom: 10px;">
              <button type="button" class="verify-btn" id="confirmOtpBtn" style="background-color: #000; color: #fff; border: none;">Confirm Code</button>
            </div>

            <!-- Content -->
            <div class="form-group">
                <label for="content">Content <span class="required">*</span></label>
                <textarea id="content" name="content" placeholder="Please enter your inquiry." required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>

    <!-- 引入外部 JavaScript 檔案 -->
    <script src="script.js"></script>

<footer>
     <p class="glitch">Hong Kong Urban Legends Museum</p>
  </footer>

            </section>
        </main>

   <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; 2026 Hong Kong Urban Legends Museum</p>
      <p class="footer-note">Student project website</p>
    </div>

</body>
</html>
